# GitHub Actions: Slim CI with incremental full-refresh tranche (BigQuery-style pattern)
# Use when modified incremental models need --full-refresh before downstream state:modified+.
# Add --exclude tag:metadata or other project excludes to both commands as needed.

name: dbt Slim CI (incremental)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'models/**'
      - 'seeds/**'
      - 'dbt_project.yml'
  push:
    branches:
      - main
    paths:
      - 'models/**'
      - 'seeds/**'
      - 'dbt_project.yml'
  workflow_dispatch:

jobs:
  dbt-core-slimci:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Orchestra pipeline (Slim CI)
        uses: orchestra-hq/run-pipeline@v1
        with:
          api_key: ${{ secrets.ORCHESTRA_API_KEY }}
          pipeline_id: PIPELINE_ID
          poll_interval: 20
          environment: ${{ github.event_name == 'pull_request' && 'PR_ENV' || 'MERGE_ENV' }}
          task_ids: TASK_ID
          run_inputs: |
            {
              "dbt_command": "build --full-refresh -s state:modified,config.materialized:incremental --defer --state latest_production --exclude tag:metadata --target ${{ github.event_name == 'pull_request' && 'ci' || 'prod' }}; dbt build -s state:modified+ --defer --state latest_production --exclude tag:metadata --exclude state:modified,config.materialized:incremental --target ${{ github.event_name == 'pull_request' && 'ci' || 'prod' }}",
              "dbt_branch": "${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}"
            }
