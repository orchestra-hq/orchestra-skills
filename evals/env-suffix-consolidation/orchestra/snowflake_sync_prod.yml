version: v1
name: 'Snowflake Customer Sync - Prod'
pipeline:
  grp-fivetran:
    tasks:
      task-fivetran:
        integration: FIVETRAN
        integration_job: FIVETRAN_SYNC_ALL
        parameters:
          connector_id: cust360_prod_connector
        depends_on: []
        name: Sync Fivetran connector
    depends_on: []
    name: Ingest
  grp-dbt:
    tasks:
      task-dbt:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: dbt run --select tag:customer_360
          package_manager: PIP
          python_version: '3.12'
          project_dir: dbt_projects/customer_360
          shallow_clone_dirs: dbt_projects/customer_360
          warehouse_identifier: PROD_WH.US-EAST-1.AWS
        depends_on: []
        name: Build customer 360 models
        connection: dbt_snowflake_prod_04421
    depends_on:
    - grp-fivetran
    name: Transform
  grp-notify:
    tasks:
      task-slack:
        integration: SLACK
        integration_job: SLACK_SEND_MESSAGE
        parameters:
          message: Customer 360 sync complete (prod)
        depends_on: []
        name: Notify Slack
        connection: slack_prod_alerts_88213
    depends_on:
    - grp-dbt
    name: Notify
schedule:
- name: Nightly 2am
  cron: 0 2 ? * * *
  timezone: UTC
configuration:
  concurrency:
    max_active: 1
meta:
  notes: Production customer 360 sync.
