# Minimal GitHub Actions workflow: Orchestra Slim CI via run-pipeline
# Place in dbt repo as .github/workflows/dbt_slim_ci.yml (rename as needed).
# Replace placeholders: PIPELINE_ID, TASK_ID, PR_ENV, MERGE_ENV, path filters.

name: dbt Slim CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'models/**'
      - 'macros/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
  push:
    branches:
      - main
    paths:
      - 'models/**'
      - 'macros/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
  workflow_dispatch:

jobs:
  dbt-core-slimci:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Orchestra pipeline (Slim CI)
        uses: orchestra-hq/run-pipeline@v1
        with:
          api_key: ${{ secrets.ORCHESTRA_API_KEY }}
          pipeline_id: PIPELINE_ID
          poll_interval: 20
          environment: ${{ github.event_name == 'pull_request' && 'PR_ENV' || 'MERGE_ENV' }}
          task_ids: TASK_ID
          run_inputs: |
            {
              "dbt_command": "build -s state:modified+ --defer --state latest_production --target ${{ github.event_name == 'pull_request' && 'ci' || 'prod' }}",
              "dbt_branch": "${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}"
            }

# Pipeline YAML in a SEPARATE repo from dbt: add on the run-pipeline step:
#   branch: main
# (branch of the pipeline YAML repository, not the dbt PR branch)
